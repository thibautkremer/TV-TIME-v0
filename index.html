    }

    function setDiscoverMode(mode) {
        currentDiscoverMode = mode;
        ['mix', 'top', 'trending'].forEach(m => {
            const btn = document.getElementById(`btn-disc-${m}`);
            btn.className = m === mode ? "py-1.5 text-xs font-bold rounded bg-teal-600 text-white shadow" : "py-1.5 text-xs font-bold rounded bg-gray-700 text-gray-300";
        });
        discoverPage = 1; 
        renderDiscoverTab(true); 
    }

    async function renderDiscoverTab(force = false) {
        if (!force && discoverResults.length > 0) return;
        const libIds = new Set(library.map(i => i.id));
        
        if (discoverMediaType === 'series') {
            await ensureShowsPool();
            let pool = showsCache.filter(s => !libIds.has(`series-${s.id}`));
            
            if(currentDiscoverMode === 'mix') {
                const favs = ['Anime', 'Action', 'Fantasy'];
                let p = pool.filter(s => s.genres?.some(g => favs.includes(g)));
                discoverResults = [...p, ...pool].sort(() => 0.5 - Math.random()).map(normalizeShow);
            } 
            else if (currentDiscoverMode === 'top') discoverResults = pool.filter(s => s.rating?.average > 0).sort((a,b) => b.rating.average - a.rating.average).map(normalizeShow);
            else if (currentDiscoverMode === 'trending') discoverResults = pool.filter(s => s.status === 'Running').sort((a,b) => b.updated - a.updated).map(normalizeShow);
        } else {
            const categories = ['2026', 'action', 'comedy', 'sci-fi'];
            let moviePool = [];
            for (let cat of categories) {
                try {
                    const res = await fetch(`${OMDB_API}&s=${cat}&type=movie`);
                    const data = await res.json();
                    if(data.Search) moviePool = moviePool.concat(data.Search);
                } catch (e) {}
            }
            discoverResults = [...new Map(moviePool.map(m => [m.imdbID, m])).values()]
                .map(m => ({
                    id: `movie-${m.imdbID}`, apiId: m.imdbID, title: m.Title, type: 'movie', 
                    image: m.Poster !== 'N/A' ? m.Poster : '', rating: 0, premiered: m.Year
                })).filter(v => !libIds.has(v.id)).sort(() => 0.5 - Math.random());
        }
        discoverResults = discoverResults.filter((v,i,a)=>a.findIndex(t=>(t.id===v.id))===i);
        discoverPage = 1; renderDiscoverGrid(true);
    }

    function renderDiscoverGrid(clear = false) {
        const container = document.getElementById('discoverGrid');
        if(clear) container.innerHTML = '';
        const start = (discoverPage - 1) * PAGE_SIZE;
        discoverResults.slice(start, start + PAGE_SIZE).forEach(m => container.appendChild(createMediaCard(m, false)));
    }

    // --- SUIVIS (LIBRARY) ---
    function renderLibrary() {
        const grid = document.getElementById('libraryGrid');
        
        const sFilter = document.getElementById('libraryStatusFilter').value;
        const tFilter = document.getElementById('libraryTypeFilter').value;
        const dFilter = document.getElementById('libraryDiffusionFilter').value;
        const gFilter = document.getElementById('smartGenreFilter').value;
        const nFilter = document.getElementById('smartNetworkFilter').value;
        const sortVal = document.getElementById('librarySortFilter').value;
        const searchInput = document.getElementById('librarySearch').value.toLowerCase().trim();
        
        grid.innerHTML = '';
        
        let filtered = library.filter(item => {
            const title = (item.title || '').toLowerCase();
            const iType = item.type || 'series';
            const iStatus = item.status || 'In Progress';

            if (searchInput !== "") {
                return title.includes(searchInput);
            }
    
            if (tFilter !== 'all' && iType !== tFilter) return false;
            
            if (sFilter === 'not_finished' && iStatus !== 'In Progress') return false;
            if (sFilter === 'watched' && iStatus !== 'Watched') return false;
            if (sFilter === 'abandoned' && iStatus !== 'Abandoned') return false;
            
            if (gFilter !== 'all' && !(item.genres || []).includes(gFilter)) return false;
            
            if (nFilter !== 'all' && !(item.network || '').includes(nFilter)) return false;
            
            if (iType === 'series' && dFilter !== 'all') {
                const sp = (item.status_production || '').toLowerCase();
                const isCanceled = item.user_forced_cancel || sp.includes('cancel');
                if (dFilter === 'canceled' && !isCanceled) return false;
                if (dFilter === 'running' && (isCanceled || !sp.includes('running'))) return false;
                if (dFilter === 'ended' && (isCanceled || !sp.includes('ended'))) return false;
            }
            
            return true;
        });
    
        filtered.sort((a, b) => {
            if (sortVal === 'title_asc') return (a.title || '').localeCompare(b.title || '');
            if (sortVal === 'title_desc') return (b.title || '').localeCompare(a.title || '');
            if (sortVal === 'date_desc') return (b.addedAt || b.last_modified || 0) - (a.addedAt || a.last_modified || 0);
            if (sortVal === 'date_asc') return (a.addedAt || a.last_modified || 0) - (b.addedAt || b.last_modified || 0);
            if (sortVal === 'rating_desc') return getCalculatedRating(b) - getCalculatedRating(a);
            if (sortVal === 'rating_asc') return getCalculatedRating(a) - getCalculatedRating(b);
            
            // Progression ascendante
            if (sortVal === 'prog_asc') {
                const progA = getProgress(a);
                const progB = getProgress(b);
                if (progA !== progB) return progA - progB;
                const weightA = ((a.type || 'series') === 'series' ? 1 : 2);
                const weightB = ((b.type || 'series') === 'series' ? 1 : 2);
                return weightA - weightB;
            }

            // Défaut : Progression descendante ('prog_desc')
            const progA = getProgress(a);
            const progB = getProgress(b);
            if (progA !== progB) return progB - progA;
            const weightA = ((a.type || 'series') === 'series' ? 1 : 2);
            const weightB = ((b.type || 'series') === 'series' ? 1 : 2);
            return weightA - weightB;
        });
    
        const frag = document.createDocumentFragment();
        filtered.forEach(item => frag.appendChild(createMediaCard(item, true)));
        grid.appendChild(frag);
        
        if (filtered.length === 0) {
            grid.innerHTML = '<p class="col-span-full text-center text-gray-500 text-sm py-10">Aucun résultat trouvé.</p>';
        }
    }
    
    function renderProfile() {
        const series = library.filter(i => i.type === 'series' && !(i.genres || []).includes('Anime') && !(i.genres || []).includes('Animation'));
        const animes = library.filter(i => (i.genres || []).includes('Anime') || (i.genres || []).includes('Animation'));
        const movies = library.filter(i => i.type === 'movie');
    
        let watchedMin = 0;
        let backlogMin = 0;
    
        library.forEach(item => {
            if (item.type === 'movie') {
                const r = parseInt(item.runtime) || 120;
                if (item.status === 'Watched') {
                    watchedMin += r;
                } else if (item.status !== 'Abandoned') {
                    // Inclut In Progress, Canceled, etc.
                    backlogMin += r;
                }
            } else if (item.type === 'series') {
                const defR = parseInt(item.runtime) || 24;
                (item.episodes || []).forEach(ep => {
                    const r = parseInt(ep.runtime) || defR;
                    if (ep.watched) {
                        watchedMin += r;
                    } else if (item.status !== 'Abandoned') {
                        // Inclut In Progress, Canceled, etc.
                        backlogMin += r;
                    }
                });
            }
        });
    
        document.getElementById('stat-hours').textContent = formatDurationProfile(watchedMin);
        document.getElementById('stat-backlog-hours').textContent = formatDurationProfile(backlogMin);
    
        // ... (le reste de la fonction renderProfile reste identique)
        const ratedItems = library.map(i => getCalculatedRating(i)).filter(r => r > 0);
        const avgRating = ratedItems.length > 0 ? (ratedItems.reduce((acc, r) => acc + r, 0) / ratedItems.length).toFixed(1) : '0.0';
        document.getElementById('stat-avg-rating').textContent = avgRating;
        
        // (Note : s'assurer que les autres éléments de stat-grid sont bien mis à jour ici)
        const sFinished = series.filter(s => s.status === 'Watched').length;
        document.getElementById('stat-series-grid').innerHTML = `<div class="text-lg font-black text-teal-400">${sFinished} / ${series.length}</div><div class="text-xs font-bold text-teal-400">${series.length > 0 ? Math.round((sFinished/series.length)*100) : 0}%</div><div class="text-[9px] uppercase text-gray-400 mt-1 tracking-wider">Séries finies</div>`;
        
        let seTotal = 0, seWatched = 0;
        series.forEach(s => { seTotal += (s.episodes||[]).length; seWatched += (s.episodes||[]).filter(e=>e.watched).length; });
        document.getElementById('stat-series-eps-grid').innerHTML = `<div class="text-lg font-black text-teal-400">${seWatched} / ${seTotal}</div><div class="text-xs font-bold text-teal-400">${seTotal > 0 ? Math.round((seWatched/seTotal)*100) : 0}%</div><div class="text-[9px] uppercase text-gray-400 mt-1 tracking-wider">Ép. Séries vus</div>`;
        
        const aFinished = animes.filter(a => a.status === 'Watched').length;
        document.getElementById('stat-anime-grid').innerHTML = `<div class="text-lg font-black text-purple-400">${aFinished} / ${animes.length}</div><div class="text-xs font-bold text-purple-400">${animes.length > 0 ? Math.round((aFinished/animes.length)*100) : 0}%</div><div class="text-[9px] uppercase text-gray-400 mt-1 tracking-wider">Anime finis</div>`;
    
        let aeTotal = 0, aeWatched = 0;
        animes.forEach(a => { aeTotal += (a.episodes||[]).length; aeWatched += (a.episodes||[]).filter(e=>e.watched).length; });
        document.getElementById('stat-anime-eps-grid').innerHTML = `<div class="text-lg font-black text-purple-400">${aeWatched} / ${aeTotal}</div><div class="text-xs font-bold text-purple-400">${aeTotal > 0 ? Math.round((aeWatched/aeTotal)*100) : 0}%</div><div class="text-[9px] uppercase text-gray-400 mt-1 tracking-wider">Ép. Anime vus</div>`;
        
        const mFinished = movies.filter(m => m.status === 'Watched').length;
        document.getElementById('stat-movies-finished').innerHTML = `<div class="text-lg font-black text-amber-400">${mFinished} / ${movies.length}</div><div class="text-xs font-bold text-amber-400">${movies.length > 0 ? Math.round((mFinished/movies.length)*100) : 0}%</div><div class="text-[9px] uppercase text-gray-400 mt-1 tracking-wider">Films vus</div>`;
    
        const gc = {}; library.forEach(i => (i.genres || []).forEach(g => gc[g] = (gc[g] || 0) + 1));
        const sortedGenres = Object.entries(gc).sort((a, b) => b[1] - a[1]); const maxG = sortedGenres.length > 0 ? sortedGenres[0][1] : 1;
        document.getElementById('stat-genre-bars').innerHTML = sortedGenres.slice(0, 5).map(([g, c]) => `<div><div class="flex justify-between text-[10px] mb-1 font-bold"><span class="text-gray-300">${g}</span><span class="text-teal-500">${c}</span></div><div class="w-full h-2 bg-gray-700 rounded-full overflow-hidden"><div class="h-full bg-teal-500" style="width:${Math.round(c / maxG * 100)}%"></div></div></div>`).join('');
        
        const nc = {}; library.forEach(i => { if (i.network && i.network !== 'Inconnu') nc[i.network] = (nc[i.network] || 0) + 1; });
        const sortedNets = Object.entries(nc).sort((a, b) => b[1] - a[1]); const maxN = sortedNets.length > 0 ? sortedNets[0][1] : 1;
        document.getElementById('stat-network-bars').innerHTML = sortedNets.slice(0, 6).map(([n, c]) => `<div><div class="flex justify-between text-[10px] mb-1 font-bold"><span class="text-gray-300">${n}</span><span class="text-blue-500">${c}</span></div><div class="w-full h-2 bg-gray-700 rounded-full overflow-hidden"><div class="h-full bg-blue-500" style="width:${Math.round(c / maxN * 100)}%"></div></div></div>`).join('');
    
        const rc = {}; library.forEach(i => { const r = getCalculatedRating(i); if (r > 0) { let rounded = Math.round(r * 2) / 2; let key = rounded < 5 ? "< 5" : rounded.toFixed(1).replace('.0', ''); rc[key] = (rc[key] || 0) + 1; } });
        let ratingKeys = []; for (let i = 10; i >= 5; i -= 0.5) ratingKeys.push(i.toFixed(1).replace('.0', '')); ratingKeys.push("< 5");
        const activeRatings = ratingKeys.filter(k => rc[k] > 0); const maxR = activeRatings.length > 0 ? Math.max(...activeRatings.map(k => rc[k])) : 1;
        document.getElementById('stat-rating-bars').innerHTML = activeRatings.map(k => `<div><div class="flex justify-between text-[10px] mb-1 font-bold"><span class="text-gray-300">${k}</span><span class="text-yellow-500">${rc[k]}</span></div><div class="w-full h-2 bg-gray-700 rounded-full overflow-hidden"><div class="h-full bg-yellow-400" style="width:${Math.round(rc[k] / maxR * 100)}%"></div></div></div>`).join('');
    }

    function getProgress(item) {
        if (!item.episodes || item.episodes.length === 0) return item.status === 'Watched' ? 100 : 0;
        const watched = item.episodes.filter(e => e.watched).length;
        return Math.round((watched / item.episodes.length) * 100);
    }

    // --- CARTES MEDIAS ---
    function buildCardActionsHTML(mediaId) {
        const inLib = library.some(i => i.id === mediaId);
        if (inLib) return `<button onclick="event.stopPropagation(); handleRemove('${mediaId}')" class="w-full text-center text-[10px] bg-gray-900 hover:bg-gray-800 text-gray-500 hover:text-red-400 border border-gray-700 py-1.5 rounded transition shadow-sm">✕ Retirer</button>`;
        return `
        <div class="flex gap-1.5 w-full">
            <button onclick="event.stopPropagation(); handleQuickAdd(this.parentElement.parentElement, '${mediaId}', false)" class="flex-1 text-center text-[10px] bg-teal-600 hover:bg-teal-500 text-white font-bold py-1.5 rounded transition shadow-sm">+ Voir</button>
            <button onclick="event.stopPropagation(); handleQuickAdd(this.parentElement.parentElement, '${mediaId}', true)" class="flex-1 text-center text-[10px] bg-emerald-700 hover:bg-emerald-600 text-white font-bold py-1.5 rounded transition shadow-sm">✓ Vu</button>
        </div>`;
    }

    async function handleRemove(mediaId) {
        if (supabaseClient) {
            try {
                await supabaseClient
                    .from('user_library')
                    .delete()
                    .eq('user_id', localUserId)
                    .eq('media_id', mediaId);
            } catch (e) {
                console.error("Erreur suppression Cloud:", e);
            }
        }
    
        library = library.filter(i => i.id !== mediaId);
        saveLocalDB(); 
        
        if (!document.getElementById('tab-library').classList.contains('hidden')) {
            renderLibrary();
        }
        renderProfile();
        
        document.querySelectorAll(`[id="actions-${mediaId}"]`).forEach(el => el.innerHTML = buildCardActionsHTML(mediaId));
    }

    async function handleQuickAdd(container, mediaId, watched) {
        container.innerHTML = `<span class="text-[9px] text-teal-400 py-1.5 font-bold animate-pulse w-full text-center block">Ajout...</span>`;
        await quickAdd(mediaId, watched);
        document.querySelectorAll(`[id="actions-${mediaId}"]`).forEach(el => el.innerHTML = buildCardActionsHTML(mediaId));
    }

    function createMediaCard(media, isLib = false) {
        const isAnime = media.genres?.includes('Anime') || media.genres?.includes('Animation');
        const bgColorClass = media.type === 'movie' ? 'bg-amber-900/60' : (isAnime ? 'bg-purple-900/60' : 'bg-teal-900/60');
        
        const div = document.createElement('div');
        div.className = 'bg-gray-800 rounded-xl border border-gray-700 overflow-hidden cursor-pointer shadow-sm relative flex flex-col hover:border-gray-500 transition-colors';
        
        div.onclick = (e) => {
            if (e.target.closest('.remove-btn')) return;
            const inLib = library.find(i => i.id === media.id);
            if (isLib || inLib) openLibraryModal(media.id);
            else openPreviewModal(media);
        };
    
        const imgSrc = (media.image && media.image !== 'N/A' && media.image !== 'image_par_defaut.jpg') 
            ? media.image 
            : 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSzNFY2uiCR89dXMmbtsvSRDxJtnpN8NJFkcNtJIz-kCA&s=10';
        
        const calcRating = getCalculatedRating(media);
        const ratingDisplay = calcRating > 0 ? calcRating.toFixed(1) : 'N/A';
        const ratingOverlay = `<div class="absolute top-1 left-1 bg-black/70 text-yellow-400 text-[10px] font-black px-1.5 py-0.5 rounded z-10 border border-gray-800">★ ${ratingDisplay}</div>`;
        
        let yearOverlay = '';
        if (!isLib && media.premiered && media.premiered !== 'N/A') {
            // SECURITE: conversion en texte avec String() pour éviter le crash .split sur un entier
            const year = String(media.premiered).split('-')[0];
            yearOverlay = `<div class="absolute top-1 right-1 bg-gray-900/80 text-gray-400 text-[10px] font-bold px-1.5 py-0.5 rounded z-10 border border-gray-700">${year}</div>`;
        }

        const removeBtn = isLib ? `<button onclick="handleRemove('${media.id}')" class="remove-btn absolute top-1 right-1 bg-black/70 text-red-500 text-[10px] font-black px-1.5 py-0.5 rounded z-10 border border-gray-800 hover:bg-red-900">✕</button>` : '';
    
        let libOverlay = '';
        if (isLib) {
            if (media.type === 'series') {
                const nextEp = media.episodes?.find(e => !e.watched && e.airdate && e.airdate <= todayString);
                if (media.status === 'Watched') libOverlay = `<button onclick="event.stopPropagation(); resetToUnwatched('${media.id}')" class="absolute bottom-1 right-1 bg-black/70 text-amber-400 text-[9px] px-1.5 py-0.5 rounded font-black z-10">↺</button>`;
                else if (nextEp) libOverlay = `<button onclick="event.stopPropagation(); checkNextEp('${media.id}')" class="absolute bottom-1 right-1 bg-teal-600 text-white text-[9px] px-1.5 py-0.5 rounded font-black z-10">✓ S${nextEp.season}E${nextEp.number}</button>`;
            } else if (media.type === 'movie') {
                if (media.status === 'Watched') {
                    libOverlay = `<button onclick="event.stopPropagation(); resetToUnwatched('${media.id}')" class="absolute bottom-1 right-1 bg-black/70 text-amber-400 text-[9px] px-1.5 py-0.5 rounded font-black z-10">↺</button>`;
                } else {
                    libOverlay = `<button onclick="event.stopPropagation(); markMovieWatched('${media.id}')" class="absolute bottom-1 right-1 bg-emerald-600 text-white text-[9px] px-1.5 py-0.5 rounded font-black z-10">✓ Vu</button>`;
                }
            }
        }
    
        div.innerHTML = `
            <div class="relative w-full">
                <img src="${imgSrc}" class="media-poster bg-gray-900" loading="lazy" />
                ${ratingOverlay}
                ${yearOverlay}
                ${removeBtn}
                ${libOverlay}
            </div>
            <div class="p-2 flex-1 flex flex-col ${isLib ? bgColorClass : 'bg-gray-800'}">
                <h3 class="font-bold text-white text-[11px] truncate leading-tight">${media.title || 'Inconnu'}</h3>
                ${!isLib ? `<div class="mt-auto pt-1" id="actions-${media.id}">${buildCardActionsHTML(media.id)}</div>` : ''}
            </div>
        `;
        return div;
    }

    function checkNextEp(id) {
        const item = library.find(i => i.id === id);
        if(!item) return;
        const nextEp = item.episodes?.find(e => !e.watched && e.airdate && e.airdate <= todayString);
        if(nextEp) {
            const idx = item.episodes.indexOf(nextEp);
            for(let i=0; i<=idx; i++) item.episodes[i].watched = true; 
            item.status = item.episodes.every(e => e.watched || !e.airdate || e.airdate > todayString) ? 'Watched' : 'In Progress';
            item.last_modified = Date.now();
            saveLocalDB(item); renderLibrary();
        }
    }
    
    function resetToUnwatched(id) {
        const item = library.find(i => i.id === id);
        if(!item) return;
        if(item.type === 'series') item.episodes?.forEach(e => e.watched = false);
        item.status = 'In Progress';
        item.last_modified = Date.now();
        saveLocalDB(item); renderLibrary();
    }

    function markMovieWatched(id) {
        const item = library.find(i => i.id === id);
        if(!item) return;
        item.status = 'Watched';
        item.last_modified = Date.now();
        saveLocalDB(item); renderLibrary();
    }

    async function quickAdd(mediaId, watched) {
        if (library.some(i => i.id === mediaId)) return;
        let media = searchResults.find(r => r.id === mediaId) || discoverResults.find(r => r.id === mediaId);
        if(!media) return;
        let episodes = [];
        if (media.type === 'series') {
            try {
                const res = await fetch(`${TVMAZE_API}/shows/${media.apiId}/episodes`);
                const apiEps = await res.json();
                episodes = apiEps.map(apiEp => {
                    const isReleased = apiEp.airdate && apiEp.airdate <= todayString;
                    return {
                        id: apiEp.id, season: apiEp.season, number: apiEp.number, name: apiEp.name,
                        airdate: apiEp.airdate, runtime: apiEp.runtime, rating: apiEp.rating?.average||0, watched: watched && isReleased
                    };
                });
            } catch(e) {}
        }
        
        const newItem = { ...media, episodes, status: watched ? 'Watched' : 'In Progress', addedAt: Date.now(), last_modified: Date.now() };
        library.push(newItem);
        saveLocalDB(newItem);
    }

    // --- MODALES ---
    function normalizeShow(show) {
        return {
            id: `series-${show.id}`, apiId: show.id, title: show.name, type: 'series',
            image: show.image?.medium || '', summary: show.summary?.replace(/<[^>]*>/g, '') || '',
            rating: show.rating?.average || 0, genres: show.genres || [], status_production: show.status || 'Running',
            // SECURITE: On force en string au cas où l'API renvoie un entier
            premiered: show.premiered ? String(show.premiered).split('-')[0] : 'N/A',
            runtime: show.runtime || show.averageRuntime || 0, network: show.network?.name || show.webChannel?.name || 'Inconnu'
        };
    }

    function populateModalBase(media) {
        document.getElementById('modalTitle').textContent = media.title;
        document.getElementById('modalPoster').src = (media.image && media.image !== 'N/A' && media.image !== 'image_par_defaut.jpg') ? media.image : 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSzNFY2uiCR89dXMmbtsvSRDxJtnpN8NJFkcNtJIz-kCA&s=10';
        document.getElementById('modalSummary').textContent = media.summary || 'Aucun résumé.';
        document.getElementById('modalPremiereDate').textContent = media.premiered || 'N/A';
        document.getElementById('modalRuntime').textContent = media.runtime > 0 ? `${media.runtime} min` : '-- min';
        document.getElementById('modalNetwork').textContent = media.network || '';
        
        const rate = getCalculatedRating(media);
        document.getElementById('modalGlobalRatingText').textContent = rate > 0 ? rate.toFixed(1) : 'N/A';
        document.getElementById('modalGlobalRatingBar').style.width = `${(rate / 10) * 100}%`;
        
        const badge = document.getElementById('modalProductionBadge');
        if(media.user_forced_cancel) { badge.textContent = 'Annulée (Forcé)'; badge.className = 'text-[9px] font-bold px-1.5 py-0.5 rounded bg-red-900 text-red-300'; }
        else {
            const s = (media.status_production || '').toLowerCase();
            if (s.includes('running')) { badge.textContent = 'En cours'; badge.className = 'text-[9px] font-bold px-1.5 py-0.5 rounded bg-emerald-900 text-emerald-400'; }
            else if (s.includes('ended')) { badge.textContent = 'Terminée'; badge.className = 'text-[9px] font-bold px-1.5 py-0.5 rounded bg-gray-700 text-gray-300'; }
            else if (s.includes('cancel')) { badge.textContent = 'Annulée'; badge.className = 'text-[9px] font-bold px-1.5 py-0.5 rounded bg-red-900 text-red-400'; }
            else { badge.textContent = media.status_production || ''; badge.className = 'text-[9px] font-bold px-1.5 py-0.5 rounded bg-gray-700 text-gray-300'; }
        }
        
        document.getElementById('modalProgressContainer').classList.add('hidden');
        document.getElementById('modalSeriesContent').classList.add('hidden');
        document.getElementById('modalEpisodesBlock').classList.add('hidden');
        document.getElementById('modalSuggestionsBlock').classList.add('hidden');
    }

    async function openPreviewModal(media) {
        modalMode = 'preview'; activeModalMediaIndex = null;
        populateModalBase(media);
        
        document.getElementById('btnForceCancel').classList.add('hidden');
        const fBtn = document.getElementById('modalActionFollowBtn');
        const wBtn = document.getElementById('modalActionAllWatchedBtn');
        
        fBtn.textContent = '+ À regarder'; fBtn.className = "w-full py-3 bg-teal-600 text-white font-bold rounded-xl text-xs";
        fBtn.onclick = async () => { fBtn.textContent='Ajout...'; await quickAdd(media.id, false); closeModal(); };
        wBtn.textContent = '✓ Déjà vu'; wBtn.className = "w-full py-3 bg-emerald-600 text-white font-bold rounded-xl text-xs";
        wBtn.onclick = async () => { wBtn.textContent='Ajout...'; await quickAdd(media.id, true); closeModal(); };

        if (media.type === 'series') {
            document.getElementById('modalSeriesContent').classList.remove('hidden');
            try {
                const res = await fetch(`${TVMAZE_API}/shows/${media.apiId}/episodes`);
                const apiEps = await res.json();
                previewEpisodes = apiEps.map(e => ({
                    id: e.id, season: e.season, number: e.number, name: e.name,
                    airdate: e.airdate, rating: e.rating?.average||0, watched: false
                }));
                buildSeasonTabs(previewEpisodes, false);
                renderGlobalGraph(previewEpisodes);
            } catch(e) {}
        }
        document.getElementById('modalViewSuggestionsBtn').onclick = () => renderSuggestions(media.id);
        document.getElementById('mediaModal').classList.remove('hidden');
    }

    function openLibraryModal(id) {
        modalMode = 'library';
        activeModalMediaIndex = library.findIndex(i => i.id === id);
        const item = library[activeModalMediaIndex];
        if(!item) return;
        
        populateModalBase(item);
        
        const cBtn = document.getElementById('btnForceCancel');
        if (item.type === 'series') {
            cBtn.classList.remove('hidden');
            cBtn.textContent = item.user_forced_cancel ? "Restaurer API Status" : "Force : Marquer Annulée";
        } else cBtn.classList.add('hidden');

        const fBtn = document.getElementById('modalActionFollowBtn');
        const wBtn = document.getElementById('modalActionAllWatchedBtn');
        
        fBtn.textContent = '✕ Retirer'; fBtn.className = "w-full py-3 bg-gray-900 text-red-400 border border-red-900/50 font-bold rounded-xl text-xs";
        
        fBtn.onclick = async () => { 
            await handleRemove(item.id); 
            closeModal(); 
        };
        
        if (item.status === 'Watched') {
            wBtn.textContent = '↺ Marquer Non Vu'; 
            wBtn.className = "w-full py-3 bg-gray-900 text-amber-400 border border-amber-900/50 font-bold rounded-xl text-xs";
            wBtn.onclick = () => { 
                if(item.episodes) item.episodes.forEach(e=>e.watched=false); 
                item.status='In Progress'; 
                item.last_modified = Date.now(); 
                saveLocalDB(item); 
                closeModal(); 
                renderLibrary(); 
            };
        } else {
            wBtn.textContent = '✓ Marquer Vu'; 
            wBtn.className = "w-full py-3 bg-emerald-600 text-white font-bold rounded-xl text-xs shadow transition";
            wBtn.onclick = () => { 
                if(item.episodes) item.episodes.forEach(e=>e.watched=true); 
                item.status='Watched'; 
                item.last_modified = Date.now(); 
                saveLocalDB(item); 
                closeModal(); 
                renderLibrary(); 
            };
        }

        if (item.type === 'series' && item.episodes) {
            document.getElementById('modalSeriesContent').classList.remove('hidden');
            const prog = getProgress(item);
            document.getElementById('modalProgressContainer').classList.remove('hidden');
            document.getElementById('modalProgressText').textContent = `${prog}%`;
            document.getElementById('modalProgressBar').style.width = `${prog}%`;
            buildSeasonTabs(item.episodes, true);
            renderGlobalGraph(item.episodes);
        }

        document.getElementById('modalViewSuggestionsBtn').onclick = () => renderSuggestions(item.id);
        document.getElementById('mediaModal').classList.remove('hidden');
    }

    function closeModal() {
        suggestionsObserver.disconnect();
        document.getElementById('mediaModal').classList.add('hidden');
    }

    function toggleForceCancel() {
        if(activeModalMediaIndex === null) return;
        library[activeModalMediaIndex].user_forced_cancel = !library[activeModalMediaIndex].user_forced_cancel;
        library[activeModalMediaIndex].last_modified = Date.now();
        saveLocalDB(library[activeModalMediaIndex]); openLibraryModal(library[activeModalMediaIndex].id); 
    }

    // --- GRAPHIQUES ---
    function renderGlobalGraph(eps) {
        const container = document.getElementById('modalGlobalGraph');
        container.innerHTML = '';
        eps.forEach(ep => {
            const r = ep.rating || 7.0;
            const h = Math.max(10, (r / 10) * 100);
            const colorClass = seasonColors[(ep.season - 1) % seasonColors.length] || 'bg-teal-500';
            container.innerHTML += `<div class="flex-1 min-w-[4px] ${colorClass} hover:opacity-80 rounded-t cursor-pointer relative z-10" style="height: ${h}%" title="S${ep.season}E${ep.number}: ${r}"></div>`;
        });
    }

    function renderSeasonGraph(eps) {
        const container = document.getElementById('modalSeasonGraph');
        container.innerHTML = '';
        eps.forEach(ep => {
            const val = (typeof ep.rating === 'object' && ep.rating !== null) ? (ep.rating.average || 0) : (ep.rating || 0);
            const r = val > 0 ? val : 7.0; 
            const h = Math.max(10, (r / 10) * 100);
            
            const colorClass = seasonColors[(ep.season - 1) % seasonColors.length] || 'bg-cyan-600';
            container.innerHTML += `<div class="flex-1 min-w-[12px] ${colorClass} hover:opacity-translate-y-1 transition rounded-t cursor-pointer flex flex-col justify-end items-center relative z-10" style="height: ${h}%" title="E${ep.number}: ${r}"><span class="text-[8px] text-white font-bold mb-0.5 opacity-80">${r > 0 ? r : ''}</span></div>`;
        });
    }

    // --- SAISONS & EPISODES ---
    function buildSeasonTabs(episodes, isLib) {
        const seasons = [...new Set(episodes.map(e => e.season))];
        const tabs = document.getElementById('modalSeasonTabs');
        tabs.innerHTML = '';
        document.getElementById('modalEpisodesBlock').classList.remove('hidden');
        
        let targetSeason = seasons[0];
        if (isLib) {
            const firstUnwatched = episodes.find(e => !e.watched && e.airdate && e.airdate <= todayString) || episodes.find(e => !e.watched);
            if (firstUnwatched) targetSeason = firstUnwatched.season;
            else targetSeason = seasons[seasons.length - 1]; 
        }

        seasons.forEach((s) => {
            const btn = document.createElement('button');
            const colorClass = seasonColors[(s - 1) % seasonColors.length] || 'bg-teal-600';
            const isActive = s === targetSeason;
            btn.className = `px-3 py-1 text-xs font-bold rounded-lg shrink-0 ${isActive ? `${colorClass} text-white` : 'bg-gray-700 text-gray-300'}`;
            btn.textContent = `S${s}`;
            btn.onclick = (e) => {
                Array.from(tabs.children).forEach(b=>b.className = 'px-3 py-1 text-xs font-bold rounded-lg shrink-0 bg-gray-700 text-gray-300');
                e.target.className = `px-3 py-1 text-xs font-bold rounded-lg shrink-0 ${colorClass} text-white`;
                renderEpisodes(episodes.filter(ep => ep.season === s), isLib);
            };
            tabs.appendChild(btn);
        });
        if (seasons.length > 0) renderEpisodes(episodes.filter(ep => ep.season === targetSeason), isLib);
    }

    function renderEpisodes(eps, isLib) {
        const list = document.getElementById('modalEpisodesList');
        renderSeasonGraph(eps);

        list.innerHTML = eps.map(ep => {
            const isFuture = !ep.airdate || ep.airdate > todayString;
            const val = (typeof ep.rating === 'object' && ep.rating !== null) ? (ep.rating.average || 0) : (ep.rating || 0);
            const rateStr = val > 0 ? `<span class="text-[9px] text-yellow-400 font-bold ml-2">★ ${val.toFixed(1)}</span>` : '';
            
            const btnClass = isFuture ? 'bg-gray-800/50 text-gray-600' : (ep.watched ? 'bg-emerald-900 text-emerald-400' : 'bg-gray-700 hover:bg-gray-600');
            const btnAction = isLib ? `<button onclick="event.stopPropagation(); ${!isFuture ? `toggleEpCascade(${ep.id}, '${ep.season}')` : ''}" class="px-2 py-1 rounded text-[10px] shrink-0 font-bold transition ${btnClass}" ${isFuture?'disabled':''}>${ep.watched ? '✓ Vu' : 'Vu'}</button>` : '';

            // Note : on récupère ici la description de l'épisode (si elle existe via le mass update)
            const summary = ep.summary || "Pas de description disponible pour cet épisode.";

            return `
            <div class="rounded-xl bg-gray-900/60 border border-gray-700/50 text-xs overflow-hidden cursor-pointer" onclick="toggleEpisodeDescription(this)">
                <div class="p-2 flex justify-between items-center">
                    <span class="truncate text-gray-300 flex-1">E${ep.number} – <b class="text-white">${ep.name}</b> <span class="text-gray-500 ml-1">${ep.airdate||'TBA'}</span> ${rateStr}</span>
                    ${btnAction}
                </div>
                <div class="episode-desc p-2 pt-0 text-gray-400 hidden border-t border-gray-700/50">
                    <p class="mt-2 leading-relaxed">${summary}</p>
                </div>
            </div>`;
        }).join('');
    }

    function toggleEpCascade(epId, seasonStr) {
        const item = library[activeModalMediaIndex];
        const epIndex = item.episodes.findIndex(e => e.id === epId);
        if (epIndex === -1) return;
        
        const targetState = !item.episodes[epIndex].watched;
        if (targetState) { for(let i=0; i<=epIndex; i++) item.episodes[i].watched = true; } 
        else { for(let i=epIndex; i<item.episodes.length; i++) item.episodes[i].watched = false; }
        
        item.status = item.episodes.every(e => e.watched || (!e.airdate || e.airdate > todayString)) ? 'Watched' : 'In Progress';
        item.last_modified = Date.now();
        saveLocalDB(item);
        
        const prog = getProgress(item);
        document.getElementById('modalProgressText').textContent = `${prog}%`;
        document.getElementById('modalProgressBar').style.width = `${prog}%`;
        renderEpisodes(item.episodes.filter(e => e.season === parseInt(seasonStr)), true);
        if(!document.getElementById('tab-library').classList.contains('hidden')) renderLibrary();
    }

    // --- SUGGESTIONS ---
    async function renderSuggestions(currentId) {
        const block = document.getElementById('modalSuggestionsBlock');
        block.classList.remove('hidden');
        block.innerHTML = `<div id="modalSuggestionsList" class="space-y-2"></div><div id="modalSuggestionsSentinel" class="h-4"></div>`;
        try {
            await ensureShowsPool();
            const baseMedia = library.find(i=>i.id===currentId) || searchResults.find(i=>i.id===currentId) || discoverResults.find(i=>i.id===currentId);
            const bGenres = baseMedia?.genres || [];
            const baseTitle = baseMedia?.title.split(/[:\-]/)[0].trim().toLowerCase() || "";
            
            modalSuggestionsPool = showsCache.filter(s => `series-${s.id}` !== currentId).map(s => {
                let score = 0;
                if (baseTitle && (s.name.toLowerCase().includes(baseTitle) || baseTitle.includes(s.name.toLowerCase()))) score += 10;
                s.genres?.forEach(g => { if(bGenres.includes(g)) score += 2; });
                if(s.network?.name === baseMedia?.network) score += 1;
                score += (s.rating?.average||0)/10;
                return { show: s, score };
            }).filter(i => i.score > 1).sort((a,b) => b.score - a.score).map(i => normalizeShow(i.show));
            
            modalSuggestionsPage = 1;
            appendSuggestions();
        } catch(e) {}
    }

    function appendSuggestions() {
        const list = document.getElementById('modalSuggestionsList');
        const slice = modalSuggestionsPool.slice(0, 8); 
        
        slice.forEach(n => {
            const div = document.createElement('div');
            div.className = 'bg-gray-900 border border-gray-700 p-2 rounded-xl flex gap-3 items-center';
            div.innerHTML = `
                <img onclick="closeModal(); openPreviewModal(${JSON.stringify(n).replace(/"/g, '&quot;')})" src="${n.image || 'https://placehold.co/40x60'}" class="w-12 h-16 object-cover rounded border border-gray-800 cursor-pointer" />
                <div class="flex-1 min-w-0" onclick="closeModal(); openPreviewModal(${JSON.stringify(n).replace(/"/g, '&quot;')})">
                    <h4 class="text-xs font-bold text-white truncate cursor-pointer">${n.title}</h4>
                    <div class="flex items-center gap-1.5 mt-1">
                        <span class="text-[9px] text-gray-400 border border-gray-700 px-1 rounded">${n.premiered}</span>
                    </div>
                </div>
                <div class="flex flex-col gap-1 w-24">
                    ${buildCardActionsHTML(n.id)}
                </div>
            `;
            list.appendChild(div);
        });
    }

    // --- CALENDRIER ---
    function setCalFilter(f) {
        calFilter = f;
        ['all','today','week','month'].forEach(id => {
            document.getElementById(`cal-${id}`).className = id === f ? 'shrink-0 text-[11px] px-3 py-1.5 rounded-lg font-bold bg-teal-600 text-white' : 'shrink-0 text-[11px] px-3 py-1.5 rounded-lg font-bold bg-gray-800 text-gray-400 border border-gray-700';
        });
        renderCalendarTab();
    }

    function renderCalendarTab() {
        const container = document.getElementById('calendarTimeline');
        container.innerHTML = '';
        const today = new Date(); today.setHours(0,0,0,0);
        let futureEps = [];

        library.forEach(item => {
            // Films
            if (item.type === 'movie' && item.premiered && String(item.premiered).length >= 4 && item.premiered >= todayString && item.status !== 'Watched') {
                if (calFilter === 'today' && item.premiered !== todayString) return;
                futureEps.push({ mediaId: item.id, showTitle: item.title, showImage: item.image, epName: 'SORTIE FILM', airdate: item.premiered, type: 'movie' });
            } 
            // Séries
            else if (item.type === 'series') {
                (item.episodes||[]).forEach(ep => {
                    if (!ep.airdate || ep.watched || item.status === 'Abandoned' || ep.airdate < todayString) return;
                    if (calFilter === 'today' && ep.airdate !== todayString) return;
                    if (calFilter === 'week' && ((new Date(ep.airdate) - today) / 86400000 > 7)) return;
                    if (calFilter === 'month' && (new Date(ep.airdate).getMonth() !== today.getMonth())) return;
                    futureEps.push({ mediaId: item.id, showTitle: item.title, showImage: item.image, epName: `S${ep.season}E${ep.number} – ${ep.name}`, airdate: ep.airdate, type: 'series' });
                });
            }
        });

        if (!futureEps.length) { 
            container.innerHTML = `<p class="text-xs text-gray-500 text-center py-12">Aucune sortie planifiée.</p>`; 
            return; 
        }
        
        futureEps.sort((a,b) => a.airdate.localeCompare(b.airdate));
        const groups = {};
        futureEps.forEach(ep => { if (!groups[ep.airdate]) groups[ep.airdate] = []; groups[ep.airdate].push(ep); });
        
        Object.entries(groups).forEach(([date, eps]) => {
            const diff = Math.ceil((new Date(date) - today) / 86400000);
            const label = diff === 0 ? "Aujourd'hui 🎉" : diff === 1 ? "Demain" : `J-${diff}`;
            container.innerHTML += `<div class="text-[11px] font-black text-teal-400 uppercase mt-3 mb-1">${label}</div>`;
            
            eps.forEach(ep => {
                const subTxt = ep.type === 'movie' ? `<span class="text-amber-500 font-bold">SORTIE FILM</span>` : ep.epName;
                
                const mediaObj = library.find(m => m.id === ep.mediaId);
                const calcR = getCalculatedRating(mediaObj);
                const rating = calcR > 0 ? `★ ${calcR.toFixed(1)}` : 'N/A';
                const platform = mediaObj?.network || '';

                container.innerHTML += `
                <div onclick="openLibraryModal('${ep.mediaId}')" class="bg-gray-800 border border-gray-700 p-3 rounded-xl flex gap-3 items-center cursor-pointer hover:border-teal-500 transition shadow relative">
                    <img src="${ep.showImage}" class="w-10 h-14 object-cover rounded-lg shrink-0 bg-gray-900" />
                    <div class="flex-1 min-w-0">
                        <div class="text-[9px] font-black text-teal-400 truncate">${ep.showTitle}</div>
                        <h4 class="font-bold text-white text-xs truncate mt-0.5">${subTxt}</h4>
                        <span class="text-[10px] text-gray-500">${ep.airdate}</span>
                    </div>
                    
                    <span class="absolute top-2 right-2 text-[9px] text-yellow-500 font-bold">${rating}</span>
                    <span class="absolute bottom-2 right-2 text-[9px] text-gray-600 font-bold">${platform}</span>
                </div>`;
            });
        });
    }

    // --- PROFIL & IMPORT ---
    function formatDurationProfile(totalMin) {
        if (isNaN(totalMin) || totalMin <= 0) return '0 h';
        let r = Math.max(0, Math.round(totalMin));
        const y = Math.floor(r / 525600); r -= y * 525600;
        const mo = Math.floor(r / 43200); r -= mo * 43200;
        const d = Math.floor(r / 1440); r -= d * 1440;
        const h = Math.floor(r / 60); const m = r % 60;
        const p = [];
        if (y) p.push(`${y} an(s)`); if (mo) p.push(`${mo} mois`);
        if (d) p.push(`${d} j`); if (h) p.push(`${h} h`); if (m) p.push(`${m} min`);
        return p.join(' ');
    }

    function renderProfile() {
        const series = library.filter(i => i.type === 'series' && !(i.genres || []).includes('Anime') && !(i.genres || []).includes('Animation'));
        const animes = library.filter(i => (i.genres || []).includes('Anime') || (i.genres || []).includes('Animation'));
        const movies = library.filter(i => i.type === 'movie');
    
        // 0. Calcul du Temps Regardé et du Backlog
        let watchedMin = 0;
        let backlogMin = 0;

        library.forEach(item => {
            if (item.type === 'movie') {
                const r = parseInt(item.runtime) || 120; // 120 min par défaut si non renseigné
                if (item.status === 'Watched') watchedMin += r;
                else if (item.status !== 'Abandoned') backlogMin += r; // On n'ajoute pas les abandons au backlog
            } else if (item.type === 'series') {
                const defR = parseInt(item.runtime) || 24; // 24 min par défaut (standard Anime/Sitcom)
                (item.episodes || []).forEach(ep => {
                    const r = parseInt(ep.runtime) || defR;
                    if (ep.watched) watchedMin += r;
                    else if (item.status !== 'Abandoned') backlogMin += r;
                });
            }
        });

        document.getElementById('stat-hours').textContent = formatDurationProfile(watchedMin);
        document.getElementById('stat-backlog-hours').textContent = formatDurationProfile(backlogMin);

        // 1. Calcul Note Globale
        const ratedItems = library.map(i => getCalculatedRating(i)).filter(r => r > 0);
        const avgRating = ratedItems.length > 0 ? (ratedItems.reduce((acc, r) => acc + r, 0) / ratedItems.length).toFixed(1) : '0.0';
        document.getElementById('stat-avg-rating').textContent = avgRating;
    
        // 2. Stats Séries (Séries entières)
        const sFinished = series.filter(s => s.status === 'Watched').length;
        document.getElementById('stat-series-grid').innerHTML = `
            <div class="text-lg font-black text-teal-400">${sFinished} / ${series.length}</div>
            <div class="text-xs font-bold text-teal-400">${series.length > 0 ? Math.round((sFinished/series.length)*100) : 0}%</div>
            <div class="text-[9px] uppercase text-gray-400 mt-1 tracking-wider">Séries finies</div>`;
    
        // 3. Stats Episodes Séries
        let seTotal = 0, seWatched = 0;
        series.forEach(s => { seTotal += (s.episodes||[]).length; seWatched += (s.episodes||[]).filter(e=>e.watched).length; });
        document.getElementById('stat-series-eps-grid').innerHTML = `
            <div class="text-lg font-black text-teal-400">${seWatched} / ${seTotal}</div>
            <div class="text-xs font-bold text-teal-400">${seTotal > 0 ? Math.round((seWatched/seTotal)*100) : 0}%</div>
            <div class="text-[9px] uppercase text-gray-400 mt-1 tracking-wider">Ép. Séries vus</div>`;
            
        // 4. Stats Animes (Animes entiers)
        const aFinished = animes.filter(a => a.status === 'Watched').length;
        document.getElementById('stat-anime-grid').innerHTML = `
            <div class="text-lg font-black text-purple-400">${aFinished} / ${animes.length}</div>
            <div class="text-xs font-bold text-purple-400">${animes.length > 0 ? Math.round((aFinished/animes.length)*100) : 0}%</div>
            <div class="text-[9px] uppercase text-gray-400 mt-1 tracking-wider">Anime finis</div>`;
    
        // 5. Stats Episodes Animes
        let aeTotal = 0, aeWatched = 0;
        animes.forEach(a => { aeTotal += (a.episodes||[]).length; aeWatched += (a.episodes||[]).filter(e=>e.watched).length; });
        document.getElementById('stat-anime-eps-grid').innerHTML = `
            <div class="text-lg font-black text-purple-400">${aeWatched} / ${aeTotal}</div>
            <div class="text-xs font-bold text-purple-400">${aeTotal > 0 ? Math.round((aeWatched/aeTotal)*100) : 0}%</div>
            <div class="text-[9px] uppercase text-gray-400 mt-1 tracking-wider">Ép. Anime vus</div>`;
    
        // 6. Films
        const mFinished = movies.filter(m => m.status === 'Watched').length;
        document.getElementById('stat-movies-finished').innerHTML = `
            <div class="text-lg font-black text-amber-400">${mFinished} / ${movies.length}</div>
            <div class="text-xs font-bold text-amber-400">${movies.length > 0 ? Math.round((mFinished/movies.length)*100) : 0}%</div>
            <div class="text-[9px] uppercase text-gray-400 mt-1 tracking-wider">Films vus</div>`;
    
        // 7. Barres Genres
        const gc = {};
        library.forEach(i => (i.genres || []).forEach(g => gc[g] = (gc[g] || 0) + 1));
        const sortedGenres = Object.entries(gc).sort((a, b) => b[1] - a[1]);
        const maxG = sortedGenres.length > 0 ? sortedGenres[0][1] : 1;
        document.getElementById('stat-genre-bars').innerHTML = sortedGenres.slice(0, 5).map(([g, c]) => `
            <div>
                <div class="flex justify-between text-[10px] mb-1 font-bold"><span class="text-gray-300">${g}</span><span class="text-teal-500">${c}</span></div>
                <div class="w-full h-2 bg-gray-700 rounded-full overflow-hidden"><div class="h-full bg-teal-500" style="width:${Math.round(c / maxG * 100)}%"></div></div>
            </div>`).join('');
    
        // 8. Barres Plateformes
        const nc = {};
        library.forEach(i => { if (i.network && i.network !== 'Inconnu') nc[i.network] = (nc[i.network] || 0) + 1; });
        const sortedNets = Object.entries(nc).sort((a, b) => b[1] - a[1]);
        const maxN = sortedNets.length > 0 ? sortedNets[0][1] : 1;
        document.getElementById('stat-network-bars').innerHTML = sortedNets.slice(0, 6).map(([n, c]) => `
            <div>
                <div class="flex justify-between text-[10px] mb-1 font-bold"><span class="text-gray-300">${n}</span><span class="text-blue-500">${c}</span></div>
                <div class="w-full h-2 bg-gray-700 rounded-full overflow-hidden"><div class="h-full bg-blue-500" style="width:${Math.round(c / maxN * 100)}%"></div></div>
            </div>`).join('');

        // 9. Barres Notes
        const rc = {};
        library.forEach(i => {
            const r = getCalculatedRating(i);
            if (r > 0) {
                let rounded = Math.round(r * 2) / 2;
                let key = rounded < 5 ? "< 5" : rounded.toFixed(1).replace('.0', '');
                rc[key] = (rc[key] || 0) + 1;
            }
        });

        let ratingKeys = [];
        for (let i = 10; i >= 5; i -= 0.5) ratingKeys.push(i.toFixed(1).replace('.0', ''));
        ratingKeys.push("< 5");

        const activeRatings = ratingKeys.filter(k => rc[k] > 0);
        const maxR = activeRatings.length > 0 ? Math.max(...activeRatings.map(k => rc[k])) : 1;

        document.getElementById('stat-rating-bars').innerHTML = activeRatings.map(k => `
            <div>
                <div class="flex justify-between text-[10px] mb-1 font-bold"><span class="text-gray-300">${k}</span><span class="text-yellow-500">${rc[k]}</span></div>
                <div class="w-full h-2 bg-gray-700 rounded-full overflow-hidden"><div class="h-full bg-yellow-400" style="width:${Math.round(rc[k] / maxR * 100)}%"></div></div>
            </div>`).join('');
        
        if (activeRatings.length === 0) {
            document.getElementById('stat-rating-bars').innerHTML = '<div class="text-[10px] text-gray-500 italic text-center py-2">Aucune note attribuée</div>';
        }
    }

    async function massUpdateLibrary(type) {
        const btnId = type === 'series' ? 'btn-mass-update-series' : 'btn-mass-update-movie';
        const btn = document.getElementById(btnId);
        const originalContent = btn.innerHTML;
        
        console.log(`[MassUpdate] 🚀 Lancement de la MAJ API pour : ${type}`);
        
        document.getElementById('btn-mass-update-series').disabled = true;
        document.getElementById('btn-mass-update-movie').disabled = true;

        const sanitizePlatform = (p) => {
            if (!p || p === 'N/A' || p.toLowerCase().includes('trakt')) return 'Theater';
            return p;
        };

        let updatedCount = 0; let skippedCount = 0; let errorCount = 0;
        const OMDB_API_KEY = 'd99a3838'; 
        const itemsToProcess = library.filter(i => i.type === type);

        for (let i = 0; i < itemsToProcess.length; i++) {
            let item = itemsToProcess[i];
            let updates = []; 
            btn.innerHTML = `<span class="truncate w-full text-center px-1">⏳ [${i+1}/${itemsToProcess.length}] ${item.title}</span>`;
            
            console.log(`[MassUpdate] ⚙️ Traitement (${i+1}/${itemsToProcess.length}) : ${item.title}`);

            try {
                let changed = false;
                let data = null;

                // --- Logique SÉRIES ---
                if (item.type === 'series' && item.apiId) {
                    const res = await fetch(`https://api.tvmaze.com/shows/${item.apiId}?embed=episodes`);
                    if (!res.ok) throw new Error(`TVMaze API Error`);
                    data = await res.json();
                    
                    // Mise à jour des infos générales
                    if (data.runtime || data.averageRuntime) { const r = data.runtime || data.averageRuntime; if (item.runtime !== r) { item.runtime = r; changed = true; updates.push("Durée"); } }
                    if (data.image?.medium && item.image !== data.image.medium) { item.image = data.image.medium; changed = true; updates.push("Affiche"); }
                    if (data.summary && item.summary !== data.summary.replace(/<[^>]*>/g, '')) { item.summary = data.summary.replace(/<[^>]*>/g, ''); changed = true; updates.push("Résumé"); }
                    if (data.status && item.status_production !== data.status) { item.status_production = data.status; changed = true; updates.push("Status"); }
                    
                    const net = sanitizePlatform(data.network?.name || data.webChannel?.name);
                    if (net && item.network !== net) { item.network = net; changed = true; updates.push("Plateforme"); }
                    
                    // --- GESTION DES NOTES (Épisodes + Fallback série) ---
                    let foundAnyEpisodeRating = false;
                    const seriesRating = data.rating?.average || 0;

                    if (data._embedded?.episodes && item.episodes) {
                        data._embedded.episodes.forEach(apiEp => {
                            const localEp = item.episodes.find(e => e.id === apiEp.id);
                            if (localEp) {
                                const newR = apiEp.rating?.average || 0;
                                if (newR > 0) foundAnyEpisodeRating = true;
                                
                                const newS = apiEp.summary ? apiEp.summary.replace(/<[^>]*>/g, '') : '';
                                const newRun = apiEp.runtime || 0;
                                if (localEp.rating !== newR || localEp.summary !== newS || localEp.runtime !== newRun) { 
                                    localEp.rating = newR; localEp.summary = newS; localEp.runtime = newRun; changed = true; 
                                }
                            }
                        });
                    }

                    // FALLBACK : Si aucune note trouvée sur les épisodes, on applique la note de la série
                    if (!foundAnyEpisodeRating && seriesRating > 0) {
                        console.log(`[MassUpdate] ⚠️ Pas de note épisode, fallback sur note série (${seriesRating}) pour ${item.title}`);
                        item.episodes.forEach(e => {
                            if (e.rating !== seriesRating) { e.rating = seriesRating; changed = true; }
                        });
                        if (item.rating !== seriesRating) { item.rating = seriesRating; changed = true; }
                        updates.push("Note (Fallback Série)");
                    } else if (data.rating?.average && item.rating !== data.rating.average) {
                        item.rating = data.rating.average; changed = true; updates.push("Note");
                    }
                    
                    if (changed && !updates.includes("Détails Épisodes") && updates.length > 0) updates.push("Détails Épisodes");
                } 
                // --- Logique FILMS ---
                else if (item.type === 'movie') {
                    let attemptData = null;
                    if (item.apiId) {
                        const res = await fetch(`https://www.omdbapi.com/?apikey=${OMDB_API_KEY}&i=${item.apiId}&plot=full`);
                        if (res.ok) attemptData = await res.json();
                    }
                    if (!attemptData || attemptData.Response === "False") {
                        let year = (item.premiered && item.premiered !== 'N/A') ? String(item.premiered).split('-')[0] : '';
                        const res2 = await fetch(`https://www.omdbapi.com/?apikey=${OMDB_API_KEY}&t=${encodeURIComponent(item.title)}&y=${year}&type=movie&plot=full`);
                        if (res2.ok) attemptData = await res2.json();
                        if (attemptData.Response === "True" && attemptData.imdbID) item.apiId = attemptData.imdbID;
                    }
                    data = attemptData;
                    if (!data || data.Response === "False") throw new Error(`Non trouvé`);

                    if (data.Runtime && data.Runtime !== "N/A") { const run = parseInt(data.Runtime); if (run && item.runtime !== run) { item.runtime = run; changed = true; updates.push("Durée"); } }
                    if (data.Poster && data.Poster !== "N/A" && item.image !== data.Poster) { item.image = data.Poster; changed = true; updates.push("Affiche"); }
                    if (data.Plot && item.summary !== data.Plot) { item.summary = data.Plot; changed = true; updates.push("Résumé"); }
                    if (data.Genre) { const newGenres = data.Genre.split(', '); if (JSON.stringify(item.genres) !== JSON.stringify(newGenres)) { item.genres = newGenres; changed = true; updates.push("Genres"); } }
                    const prod = sanitizePlatform(data.Production);
                    if (prod && item.network !== prod) { item.network = prod; changed = true; updates.push("Plateforme"); }
                    if (data.imdbRating && data.imdbRating !== "N/A" && item.rating !== parseFloat(data.imdbRating)) { item.rating = parseFloat(data.imdbRating); changed = true; updates.push("Note"); }
                }

                if (changed) {
                    item.last_modified = Date.now();
                    await supabaseClient.from('user_library').upsert({ 
                        user_id: localUserId, media_id: item.id, media_data: item, last_modified: item.last_modified
                    }, { onConflict: 'user_id,media_id' });
                    saveLocalDB();
                    updatedCount++;
                    console.log(`[MassUpdate] ✅ [${item.title}] mis à jour : ${updates.join(', ')}`);
                } else {
                    skippedCount++;
                    console.log(`[MassUpdate] ➖ Aucun changement nécessaire pour : ${item.title}`);
                }
            } catch (e) {
                console.error(`[MassUpdate] ❌ Erreur sur ${item.title}:`, e);
                errorCount++;
            }
            await new Promise(r => setTimeout(r, 800));
        }

        btn.innerHTML = originalContent;
        document.getElementById('btn-mass-update-series').disabled = false;
        document.getElementById('btn-mass-update-movie').disabled = false;
        
        console.log(`[MassUpdate] 🏁 Terminé. Stats: ${updatedCount} mis à jour, ${skippedCount} OK, ${errorCount} erreurs.`);
        alert(`Bilan (${type}) :\n✅ ${updatedCount} mis à jour\n➖ ${skippedCount} OK\n❌ ${errorCount} erreurs.`);
        location.reload();
    }

    async function importLibrary(event) {
        const files = event.target.files;
        if (!files.length) return;
    
        alert("Import en cours... Ne fermez pas la page.");
    
        for (let file of files) {
            if (file.name.endsWith('.json')) {
                const text = await file.text();
                try {
                    const data = JSON.parse(text);
                    
                    for (let raw of data) {
                        const idx = library.findIndex(x => x.id === raw.id || x.title === raw.title);
                        if(idx !== -1) {
                            library[idx] = {...library[idx], ...raw, last_modified: Date.now()};
                        } else {
                            library.push({...raw, last_modified: Date.now()});
                        }
                        
                        if (supabaseClient) {
                            await supabaseClient.from('user_library').upsert({ 
                                user_id: localUserId, 
                                media_id: raw.id, 
                                media_data: raw, 
                                last_modified: Date.now() 
                            }, { onConflict: 'user_id, media_id' });
                        }
                    }
                } catch(err) { 
                    console.error(err);
                    alert('Erreur JSON sur ' + file.name); 
                }
            }
        }
        
        renderProfile(); 
        renderLibrary(); 
        alert("Import et synchronisation Cloud terminés !");
    }
    
    function exportLibrary() {
        if (library.length === 0) {
            alert("Rien à exporter, la bibliothèque est vide.");
            return;
        }

        const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(library, null, 2));
        const downloadAnchorNode = document.createElement('a');
        downloadAnchorNode.setAttribute("href", dataStr);
        downloadAnchorNode.setAttribute("download", "tv_time_backup.json");
        document.body.appendChild(downloadAnchorNode);
        downloadAnchorNode.click();
        downloadAnchorNode.remove();
        console.log(`[Export] ✅ ${library.length} items exportés avec succès.`);
    }

    function clearAll() {
        if (!confirm('Vider le cache local ? La sauvegarde Cloud restera intacte. (Pour effacer le Cloud, videz la table Supabase manuellement).')) return;
        library = []; localStorage.removeItem('personal_tracker_db'); renderLibrary(); renderProfile();
    }

    window.addEventListener('focus', () => {
        loadFromCloud();
        console.log("Mise à jour automatique pour consultation...");
    });
</script>
