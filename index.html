<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV TIME REBORN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-gray-900 text-gray-100 font-sans pb-20 overflow-x-hidden">

<header class="bg-gray-800 border-b border-gray-700 sticky top-0 z-40 shadow-md">
    <div class="max-w-screen-2xl mx-auto px-4 py-1.5 flex justify-between items-center">
        <h1 class="text-sm font-black tracking-wider text-teal-400 flex items-center gap-1.5 uppercase">
            TV TIME <span class="text-white text-[10px] px-1.5 py-0.5 bg-teal-600 rounded">REBORN</span>
        </h1>
        <div class="flex items-center gap-2">
            <button onclick="forceSync()" id="cloudStatus" class="cursor-pointer text-[10px] px-2 py-0.5 bg-gray-900 text-gray-400 rounded-full font-bold shadow border border-gray-700">○ Local</button>
            <span id="libCount" class="text-[10px] px-2 py-0.5 bg-teal-950 text-teal-400 rounded-full font-bold border border-teal-900/50 hidden">0</span>
        </div>
    </div>
</header>

<main class="max-w-screen-2xl mx-auto px-3 sm:px-4 pt-4 w-full" id="mainContainer">
    <!-- RECHERCHE -->
    <div id="tab-search" class="space-y-4 hidden">
        <div class="flex flex-col gap-3">
            <div class="flex gap-2">
                <div class="grid grid-cols-3 gap-1 bg-gray-800 p-1 rounded-xl border border-gray-700 w-full sm:w-48 shrink-0">
                    <button onclick="setSearchType('series')" id="btn-search-type-series" class="py-1.5 text-[10px] font-black rounded-lg bg-teal-600 text-white shadow flex items-center justify-center text-center">Séries</button>
                    <button onclick="setSearchType('anime')" id="btn-search-type-anime" class="py-1.5 text-[10px] font-bold rounded-lg text-gray-400 hover:bg-gray-700 transition flex items-center justify-center text-center">Animes</button>
                    <button onclick="setSearchType('movie')" id="btn-search-type-movie" class="py-1.5 text-[10px] font-bold rounded-lg text-gray-400 hover:bg-gray-700 transition flex items-center justify-center text-center">Films</button>
                </div>
                <div class="relative flex-1">
                    <input type="text" id="searchInput" placeholder="Rechercher..." class="w-full bg-gray-800 border border-gray-700 rounded-xl px-4 py-2.5 text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-teal-500 text-sm" />
                    <button id="clearSearchBtn" onclick="document.getElementById('searchInput').value=''; performSearch(''); this.classList.add('hidden')" class="absolute right-3 top-3 text-gray-400 hover:text-white hidden">✕</button>
                </div>
            </div>
        </div>
        <div id="searchResults" class="media-grid"></div>
    </div>

    <!-- DÉCOUVRIR -->
    <div id="tab-discover" class="space-y-4 hidden">
        <div class="bg-gray-800 p-3 rounded-xl border border-gray-700 flex flex-col gap-3">
            <div class="flex justify-center bg-gray-900 rounded-lg p-0.5 border border-gray-700">
                <button onclick="setDiscoverType('series')" id="btn-disc-type-series" class="flex-1 py-1.5 text-xs font-bold rounded bg-teal-600 text-white shadow">Séries</button>
                <button onclick="setDiscoverType('movie')" id="btn-disc-type-movie" class="flex-1 py-1.5 text-xs font-bold rounded text-gray-400">Films</button>
            </div>
        </div>
        <div id="discoverGrid" class="media-grid"></div>
    </div>

    <!-- LIBRAIRIE -->
    <div id="tab-library" class="space-y-3">
        <div id="libraryGrid" class="media-grid"></div>
    </div>

    <!-- ... (reste des onglets tab-profile, tab-admin identiques) -->
</main>

<!-- NAVIGATION -->
<nav class="fixed bottom-0 w-full bg-gray-800 border-t border-gray-700 flex justify-around p-3 z-50">
    <button onclick="switchTab('search')" class="text-xs text-gray-400">🔍 Rechercher</button>
    <button onclick="switchTab('discover')" class="text-xs text-gray-400">✨ Découvrir</button>
    <button onclick="switchTab('library')" class="text-xs text-teal-400 font-bold">📚 Suivis</button>
    <button onclick="switchTab('profile')" class="text-xs text-gray-400">👤 Profil</button>
</nav>

<script>
    function switchTab(tabId) {
        document.querySelectorAll('main > div').forEach(el => el.classList.add('hidden'));
        document.getElementById('tab-' + tabId).classList.remove('hidden');
    }
</script>
<script src="js/utils.js"></script>
<script src="js/api.js"></script>
<script src="js/cards.js"></script>
<script src="js/modal.js"></script>
<script src="js/library.js"></script>
<script src="js/discover.js"></script>
<script src="js/search.js"></script>
<script src="js/admin.js"></script>
<script src="js/main.js"></script>
</body>
</html>
