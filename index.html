<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV TIME REBORN</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><path d='M30 40 L70 40 L65 90 L35 90 Z' fill='%230D9488'/><path d='M20 40 Q50 10 80 40' fill='%23FBBF24'/><circle cx='40' cy='30' r='10' fill='%23FBBF24'/><circle cx='60' cy='25' r='12' fill='%23FBBF24'/></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background-color: #111827; -webkit-tap-highlight-color: transparent; }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }
        .hidden { display: none !important; }
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .media-poster { width: 100%; aspect-ratio: 155.88 / 217.56; object-fit: cover; }
        .media-grid { display: grid; gap: 0.5rem; grid-template-columns: repeat(3, 1fr); }
        @media (min-width: 480px)  { .media-grid { grid-template-columns: repeat(4, 1fr); } }
        @media (min-width: 640px)  { .media-grid { grid-template-columns: repeat(5, 1fr); } }
        @media (min-width: 900px)  { .media-grid { grid-template-columns: repeat(6, 1fr); } }
        @media (min-width: 1200px) { .media-grid { grid-template-columns: repeat(8, 1fr); } }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 font-sans pb-20">

<header class="bg-gray-800 border-b border-gray-700 sticky top-0 z-50 shadow-md">
    <div class="max-w-screen-2xl mx-auto px-4 py-2.5 flex justify-between items-center">
        <h1 class="text-lg font-black tracking-wider text-teal-400 flex items-center gap-2">
            🍿 TV TIME <span class="text-white text-xs px-2 py-0.5 bg-teal-600 rounded">REBORN</span>
        </h1>
        <div class="flex items-center gap-2">
            <button onclick="forceSync()" id="cloudStatus" class="cursor-pointer text-[10px] px-2 py-0.5 bg-gray-900 text-gray-400 rounded-full font-bold transition-colors shadow">○ Local</button>
            <span id="libCount" class="text-[10px] px-2 py-0.5 bg-teal-950 text-teal-400 rounded-full font-bold border border-teal-900/50 hidden">0</span>
        </div>
    </div>
</header>

<main class="max-w-screen-2xl mx-auto px-3 sm:px-4 pt-4 w-full">

    <!-- TAB: SEARCH -->
    <div id="tab-search" class="space-y-4">
        <div class="flex flex-col gap-2">
            <div class="flex gap-2">
                <div class="grid grid-cols-2 gap-1.5 bg-gray-800 p-1 rounded-xl border border-gray-700 flex-shrink-0 w-48">
                    <button onclick="setMediaType('series')" id="btn-series" class="py-2 text-sm font-bold rounded-lg bg-teal-600 text-white shadow">Séries</button>
                    <button onclick="setMediaType('movie')" id="btn-movie" class="py-2 text-sm font-bold rounded-lg text-gray-400">Films</button>
                </div>
                <div class="relative flex-1 flex items-center">
                    <input type="text" id="searchInput" placeholder="Recherche souple..." class="w-full bg-gray-800 border border-gray-700 rounded-xl px-4 py-3 pr-10 text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-teal-500 text-sm" />
                    <button id="clearSearchBtn" onclick="document.getElementById('searchInput').value=''; searchResults=[]; resetAndDisplaySearch(); this.classList.add('hidden')" class="absolute right-3 text-gray-400 hover:text-white font-bold hidden">✕</button>
                </div>
            </div>
            <div class="flex gap-2 items-center">
                <select id="searchBroadcastFilter" onchange="resetAndDisplaySearch()" class="bg-gray-800 border border-gray-700 rounded-lg text-xs px-2.5 py-1.5 text-gray-300">
                    <option value="all">Toutes diffusions</option>
                    <option value="running">En cours</option>
                    <option value="ended">Terminées</option>
                    <option value="canceled">Annulées</option>
                </select>
            </div>
        </div>
        <div id="searchResults" class="media-grid"></div>
        <div id="searchSentinel" class="h-4"></div>
    </div>

    <!-- TAB: DISCOVER -->
    <div id="tab-discover" class="space-y-4 hidden">
        <div class="bg-gray-800 p-3 sm:p-4 rounded-xl border border-gray-700 flex flex-col gap-3">
            <div class="flex justify-between items-center">                
                <div class="flex bg-gray-900 rounded-lg p-0.5 border border-gray-700">
                    <button onclick="setDiscoverType('series')" id="btn-disc-type-series" class="px-3 py-1 text-[10px] font-bold rounded shadow bg-teal-600 text-white transition">Séries</button>
                    <button onclick="setDiscoverType('movie')" id="btn-disc-type-movie" class="px-3 py-1 text-[10px] font-bold rounded text-gray-400 hover:text-white transition">Films</button>
                </div>
            </div>
            <div class="grid grid-cols-3 gap-2">
                <button onclick="setDiscoverMode('mix')" id="btn-disc-mix" class="py-1.5 text-xs font-bold rounded bg-teal-600 text-white shadow">Pour vous</button>
                <button onclick="setDiscoverMode('top')" id="btn-disc-top" class="py-1.5 text-xs font-bold rounded bg-gray-700 text-gray-300">Mieux notés</button>
                <button onclick="setDiscoverMode('trending')" id="btn-disc-trending" class="py-1.5 text-xs font-bold rounded bg-gray-700 text-gray-300">Tendances</button>
            </div>
        </div>
        <div id="discoverGrid" class="media-grid"></div>
        <div id="discoverSentinel" class="h-4"></div>
    </div>

    <!-- TAB: CALENDAR -->
    <div id="tab-calendar" class="space-y-4 hidden">
        <div class="flex justify-between items-center border-b border-gray-800 pb-2">
            <h2 class="text-lg font-bold text-white">📅 Calendrier des Sorties</h2>
        </div>
        <div class="flex gap-2 overflow-x-auto pb-1 hide-scroll" id="calFilterRow">
            <button onclick="setCalFilter('all')" id="cal-all" class="shrink-0 text-[11px] px-3 py-1.5 rounded-lg font-bold bg-teal-600 text-white transition">Tout</button>
            <button onclick="setCalFilter('today')" id="cal-today" class="shrink-0 text-[11px] px-3 py-1.5 rounded-lg font-bold bg-gray-800 text-gray-400 border border-gray-700">Aujourd'hui</button>
            <button onclick="setCalFilter('week')" id="cal-week" class="shrink-0 text-[11px] px-3 py-1.5 rounded-lg font-bold bg-gray-800 text-gray-400 border border-gray-700">Cette semaine</button>
            <button onclick="setCalFilter('month')" id="cal-month" class="shrink-0 text-[11px] px-3 py-1.5 rounded-lg font-bold bg-gray-800 text-gray-400 border border-gray-700">Ce mois</button>
        </div>
        <div id="calendarTimeline" class="space-y-2"></div>
    </div>

    <!-- TAB: LIBRARY -->
    <div id="tab-library" class="space-y-3 hidden">
        <div class="flex gap-2 items-center overflow-x-auto hide-scroll pb-2 border-b border-gray-800">
            <select id="libraryTypeFilter" onchange="renderLibrary()" class="bg-gray-800 border border-gray-700 rounded-lg text-[10px] px-2 py-1.5 text-gray-300 shrink-0">
                <option value="all">Tous types</option>
                <option value="series">Séries</option>
                <option value="movie">Films</option>
            </select>
            <select id="libraryStatusFilter" onchange="renderLibrary()" class="bg-gray-800 border border-gray-700 rounded-lg text-[10px] px-2 py-1.5 text-gray-300 shrink-0">
                <option value="all">Tous visionnages</option>
                <option value="not_finished" selected>En cours</option>
                <option value="watched">Terminé</option>
                <option value="abandoned">Abandonné</option>
            </select>
            <select id="libraryDiffusionFilter" onchange="renderLibrary()" class="bg-gray-800 border border-gray-700 rounded-lg text-[10px] px-2 py-1.5 text-gray-300 shrink-0">
                <option value="all">Toutes diffusions</option>
                <option value="running">En cours</option>
                <option value="ended">Terminée</option>
                <option value="canceled">Annulée</option>
            </select>
        </div>
        
        <div class="flex gap-2 overflow-x-auto pb-1 hide-scroll">
            <select id="librarySortFilter" onchange="renderLibrary()" class="bg-gray-800 border border-gray-700 rounded-lg text-[10px] px-2 py-1 text-gray-300 shrink-0">
                <option value="prog_desc" selected>Progression (Max ➔ Min)</option>
                <option value="prog_asc">Progression (Min ➔ Max)</option>
                <option value="title_asc">Titre (A ➔ Z)</option>
                <option value="title_desc">Titre (Z ➔ A)</option>
                <option value="date_desc">Ajout (Plus récent)</option>
                <option value="date_asc">Ajout (Plus ancien)</option>
                <option value="rating_desc">Note (Meilleure)</option>
                <option value="rating_asc">Note (Moins bonne)</option>
            </select>
            <select id="smartGenreFilter" onchange="renderLibrary()" class="bg-gray-800 border border-gray-700 rounded-lg text-[10px] px-2 py-1 text-gray-300 shrink-0">
                <option value="all">Tous les Genres</option>
                <option value="Action">Action</option>
                <option value="Anime">Anime</option>
                <option value="Comedy">Comédie</option>
                <option value="Drama">Drame</option>
                <option value="Fantasy">Fantasy</option>
                <option value="Science-Fiction">Sci-Fi</option>
            </select>
            <select id="smartNetworkFilter" onchange="renderLibrary()" class="bg-gray-800 border border-gray-700 rounded-lg text-[10px] px-2 py-1 text-gray-300 shrink-0">
                <option value="all">Plateformes</option>
                <option value="Netflix">Netflix</option>
                <option value="HBO">HBO</option>
                <option value="Amazon">Amazon</option>
                <option value="Disney+">Disney+</option>
                <option value="Apple TV+">Apple TV+</option>
            </select>
            <button onclick="document.getElementById('librarySearch').value=''; document.getElementById('clearLibSearchBtn').classList.add('hidden'); document.getElementById('smartGenreFilter').value='all'; document.getElementById('smartNetworkFilter').value='all'; document.getElementById('librarySortFilter').value='prog_desc'; renderLibrary();" class="shrink-0 text-[10px] px-2 py-1 rounded bg-gray-700 text-white hover:bg-gray-600 transition">✕ Reset</button>
        </div>

        <div class="mb-3 relative">
            <input type="text" id="librarySearch" oninput="document.getElementById('clearLibSearchBtn').classList.toggle('hidden', this.value.length === 0); renderLibrary()" placeholder="Rechercher dans mes suivis..." class="bg-gray-800 border border-gray-700 rounded-lg text-xs px-3 py-2 w-full text-white pr-10">
            <button id="clearLibSearchBtn" onclick="document.getElementById('librarySearch').value=''; this.classList.add('hidden'); renderLibrary()" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-white font-bold hidden text-sm">✕</button>
        </div>
        <div id="libraryGrid" class="media-grid"></div>
    </div>

    <!-- TAB: PROFILE -->
    <div id="tab-profile" class="space-y-4 hidden">       
        <!-- Stats Unifiées (Grille 4x2) -->
        <div class="grid grid-cols-2 sm:grid-cols-4 gap-3">
            <!-- LIGNE 1 -->
            <div class="bg-gray-800 p-4 rounded-xl text-center border border-gray-700 shadow-md flex flex-col justify-center">
                <div id="stat-hours" class="text-lg font-black text-teal-400 tracking-wide">0 h</div>
                <div class="text-[9px] uppercase text-gray-400 mt-1 tracking-wider">Temps regardé</div>
            </div>
            <div class="bg-gray-800 p-4 rounded-xl text-center border border-gray-700 shadow-md flex flex-col justify-center">
                <div id="stat-backlog-hours" class="text-lg font-black text-purple-400 tracking-wide">0 h</div>
                <div class="text-[9px] uppercase text-gray-400 mt-1 tracking-wider">Backlog</div>
            </div>
            <div class="bg-gray-800 p-4 rounded-xl text-center border border-gray-700 shadow-md flex flex-col justify-center">
                <div id="stat-avg-rating" class="text-lg font-black text-yellow-400 tracking-wide">0.0</div>
                <div class="text-[9px] uppercase text-gray-400 mt-1 tracking-wider">Note globale</div>
            </div>
            <div id="stat-movies-finished" class="bg-gray-800 p-4 rounded-xl text-center border border-gray-700 shadow-md flex flex-col justify-center">
                 <!-- Injecté par JS -->
            </div>

            <!-- LIGNE 2 -->
            <div id="stat-series-grid" class="bg-gray-800 p-4 rounded-xl text-center border border-gray-700 shadow-md flex flex-col justify-center"></div>
            <div id="stat-series-eps-grid" class="bg-gray-800 p-4 rounded-xl text-center border border-gray-700 shadow-md flex flex-col justify-center"></div>
            <div id="stat-anime-grid" class="bg-gray-800 p-4 rounded-xl text-center border border-gray-700 shadow-md flex flex-col justify-center"></div>
            <div id="stat-anime-eps-grid" class="bg-gray-800 p-4 rounded-xl text-center border border-gray-700 shadow-md flex flex-col justify-center"></div>
        </div>

        <!-- Répartition Genres -->
        <div class="bg-gray-800 p-4 rounded-xl border border-gray-700 shadow-md space-y-2">
            <h3 class="text-[11px] font-bold text-teal-400 uppercase tracking-wider">🏷️ Répartition par genres</h3>
            <div id="stat-genre-bars" class="space-y-3 mt-3"></div>
        </div>
        
        <!-- Plateformes (Barres horizontales) -->
        <div class="bg-gray-800 p-4 rounded-xl border border-gray-700 shadow-md space-y-2">
            <h3 class="text-[11px] font-bold text-blue-400 uppercase tracking-wider">🌐 Plateformes</h3>
            <div id="stat-network-bars" class="space-y-3 mt-3"></div>
        </div>

        <!-- Répartition Notes -->
        <div class="bg-gray-800 p-4 rounded-xl border border-gray-700 shadow-md space-y-2">
            <h3 class="text-[11px] font-bold text-yellow-400 uppercase tracking-wider">⭐ Répartition par notes</h3>
            <div id="stat-rating-bars" class="space-y-3 mt-3"></div>
        </div>

        <!-- Boutons d'action -->
        <div class="grid grid-cols-2 gap-2">
            <button id="btn-mass-update-series" onclick="massUpdateLibrary('series')" class="bg-purple-800 hover:bg-purple-700 border border-purple-600 text-purple-100 text-[10px] sm:text-xs font-bold py-3 rounded-xl shadow transition flex justify-center items-center px-2 overflow-hidden">
                <span class="truncate">🔄 MAJ API (Séries)</span>
            </button>
            <button id="btn-mass-update-movie" onclick="massUpdateLibrary('movie')" class="bg-amber-800 hover:bg-amber-700 border border-amber-600 text-amber-100 text-[10px] sm:text-xs font-bold py-3 rounded-xl shadow transition flex justify-center items-center px-2 overflow-hidden">
                <span class="truncate">🔄 MAJ API (Films)</span>
            </button>
            
            <label class="bg-teal-600 hover:bg-teal-500 text-white text-[10px] sm:text-xs font-bold py-3 rounded-xl transition flex justify-center items-center gap-2 cursor-pointer shadow">
                <span>📂 Import</span><input type="file" multiple onchange="importLibrary(event)" class="hidden" accept=".json,.csv" />
            </label>
            <button onclick="exportLibrary()" class="bg-blue-600 hover:bg-blue-500 text-white text-[10px] sm:text-xs font-bold py-3 rounded-xl transition shadow flex justify-center items-center gap-2">
                <span>💾 Export</span>
            </button>
            <button onclick="clearAll()" class="col-span-2 bg-gray-800 hover:bg-red-950 border border-red-900/40 text-red-400 text-[10px] sm:text-xs font-bold py-3 rounded-xl transition shadow flex justify-center items-center gap-2">
                <span>🗑 Vider Cache</span>
            </button>
        </div>
    </div>
</main>

<!-- MODAL DES MEDIAS -->
<div id="mediaModal" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-50 flex items-center justify-center p-3 hidden">
    <div class="bg-gray-800 border border-gray-700 w-full max-w-lg lg:max-w-2xl rounded-2xl shadow-2xl flex flex-col max-h-[90vh] overflow-hidden">
        
        <div class="p-3 sm:p-4 flex gap-3 border-b border-gray-700 bg-gray-800 shrink-0 relative z-20">
            <img id="modalPoster" src="" class="w-20 h-28 object-cover rounded border border-gray-700 shrink-0" />
            <div class="min-w-0 flex-1 flex flex-col justify-center">
                <div class="flex justify-between items-start">
                    <h2 id="modalTitle" class="font-black text-white text-lg leading-tight line-clamp-2">Détails</h2>
                    <button onclick="closeModal()" class="text-gray-400 hover:text-white bg-gray-700 w-7 h-7 rounded-full font-bold text-sm shrink-0">✕</button>
                </div>
                
                <div class="flex flex-wrap items-center gap-1.5 mt-2 w-full">
                    <span id="modalTypeBadge" class="text-[9px] font-black px-1.5 py-0.5 rounded bg-teal-600 text-white">SÉRIE</span>
                    <span id="modalProductionBadge" class="text-[9px] font-bold px-1.5 py-0.5 rounded bg-gray-700 text-white uppercase"></span>
                    <span id="modalNetwork" class="text-[9px] font-bold px-1.5 py-0.5 rounded bg-blue-900 text-blue-300"></span>
                    <span id="modalPremiereDate" class="text-[10px] text-gray-400 border border-gray-600 px-1.5 py-0.5 rounded">Date</span>
                    <span id="modalRuntime" class="text-[10px] text-gray-400 border border-gray-600 px-1.5 py-0.5 rounded">-- min</span>
                    
                    <div class="flex items-center gap-1.5 bg-yellow-900/20 px-2 py-1 rounded border border-yellow-700/30 ml-auto">
                        <span id="modalGlobalRatingText" class="text-[10px] font-black text-yellow-400">N/A</span>
                        <div class="w-12 h-1.5 bg-gray-800 rounded-full overflow-hidden border border-gray-700">
                            <div id="modalGlobalRatingBar" class="h-full bg-yellow-400 transition-all" style="width: 0%"></div>
                        </div>
                    </div>
                </div>
                <button id="btnForceCancel" onclick="toggleForceCancel()" class="mt-2 text-[10px] w-max bg-gray-900 border border-red-900/50 text-red-400 px-2 py-1 rounded hidden">Force : Marquer Annulée</button>
            </div>
        </div>
        
        <div class="p-3 sm:p-4 overflow-y-auto flex-1 hide-scroll space-y-5 relative">
            <div id="modalProgressContainer" class="hidden space-y-1 bg-gray-900/50 p-3 rounded-xl border border-gray-700/50">
                <div class="flex justify-between text-xs font-bold text-gray-300">
                    <span>Avancement global</span>
                    <span id="modalProgressText" class="text-teal-400">0%</span>
                </div>
                <div class="w-full bg-gray-700 h-2 rounded-full overflow-hidden">
                    <div id="modalProgressBar" class="bg-teal-500 h-full rounded-full transition-all duration-500" style="width: 0%"></div>
                </div>
            </div>

            <div id="modalActionButtonsGrid" class="grid grid-cols-2 gap-2">
                <button id="modalActionFollowBtn" class="w-full py-3 bg-teal-600 text-white font-bold rounded-xl text-xs shadow transition">À regarder</button>
                <button id="modalActionAllWatchedBtn" class="w-full py-3 bg-emerald-600 text-white font-bold rounded-xl text-xs shadow transition">Déjà vu</button>
            </div>

            <p id="modalSummary" class="text-xs text-gray-300 leading-relaxed bg-gray-900/40 p-3 rounded-xl border border-gray-700/50"></p>
            
            <div id="modalSeriesContent" class="space-y-4 hidden">
                <div class="relative h-20 bg-gray-900 rounded-lg border border-gray-700 pt-1 pb-1">
                    <div class="absolute left-1 text-[6px] text-yellow-500/70 z-0 font-bold -translate-y-1/2" style="top: 0%;">10</div>
                    <div class="absolute left-1 text-[6px] text-yellow-500/70 z-0 font-bold -translate-y-1/2" style="top: 25%;">7.5</div>
                    <div class="absolute left-1 text-[6px] text-yellow-500/70 z-0 font-bold -translate-y-1/2" style="top: 50%;">5</div>
                    <div class="absolute inset-x-0 border-t border-dashed border-yellow-500/40 z-0" style="top: 0%;"></div>
                    <div class="absolute inset-x-0 border-t border-dashed border-yellow-500/40 z-0" style="top: 25%;"></div>
                    <div class="absolute inset-x-0 border-t border-dashed border-yellow-500/40 z-0" style="top: 50%;"></div>
                    <div class="absolute right-1 left-3 bottom-1 top-1 flex items-end gap-[1px] overflow-x-auto hide-scroll z-10" id="modalGlobalGraph"></div>
                </div>

                <div id="modalSeasonSelectionRow" class="space-y-2 mt-2">
                    <h3 class="text-xs font-bold text-gray-400 uppercase tracking-wider">Saisons</h3>
                    <div id="modalSeasonTabs" class="flex gap-1.5 overflow-x-auto pb-1 hide-scroll"></div>
                </div>
                
                <div class="relative h-12 bg-gray-900 rounded-lg border border-gray-700">
                    <div class="absolute inset-x-1 bottom-1 top-1 flex items-end gap-[2px] overflow-x-auto hide-scroll z-10" id="modalSeasonGraph"></div>
                </div>
                
                <div id="modalEpisodesBlock" class="space-y-2 hidden">
                    <h3 class="text-sm font-bold text-white">Épisodes</h3>
                    <div id="modalEpisodesList" class="max-h-80 overflow-y-auto space-y-2 pr-1 hide-scroll"></div>
                </div>
            </div>

            <button id="modalViewSuggestionsBtn" class="w-full py-3 mt-4 bg-gray-900 hover:bg-gray-800 border border-teal-900/50 text-teal-400 font-bold rounded-xl text-xs shadow transition">💡 Voir des suggestions similaires</button>
            <div id="modalSuggestionsBlock" class="hidden mt-2 space-y-2"></div>
        </div>
    </div>
</div>

<nav class="fixed bottom-0 left-0 right-0 bg-gray-800 border-t border-gray-700 h-16 flex items-center justify-around z-40">
    <button onclick="switchTab('search')" id="nav-search" class="flex flex-col items-center text-xs text-teal-400 font-bold flex-1"><span class="text-lg">🔍</span><span class="text-[10px]">Chercher</span></button>
    <button onclick="switchTab('discover')" id="nav-discover" class="flex flex-col items-center text-xs text-gray-400 flex-1"><span class="text-lg">✨</span><span class="text-[10px]">Découvrir</span></button>
    <button onclick="switchTab('calendar')" id="nav-calendar" class="flex flex-col items-center text-xs text-gray-400 flex-1"><span class="text-lg">📅</span><span class="text-[10px]">Calendrier</span></button>
    <button onclick="switchTab('library')" id="nav-library" class="flex flex-col items-center text-xs text-gray-400 flex-1"><span class="text-lg">📚</span><span class="text-[10px]">Suivis</span></button>
    <button onclick="switchTab('profile')" id="nav-profile" class="flex flex-col items-center text-xs text-gray-400 flex-1"><span class="text-lg">📊</span><span class="text-[10px]">Profil</span></button>
</nav>

<script>
    'use strict';
    
    // ==========================================
    // CONFIGURATION & VARIABLES GLOBALES
    // ==========================================
    const SUPABASE_URL = 'https://vjhegncviufyguzdrpdp.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_hLYKWsVftWedOIbDinl0mQ_9uGREGsw';
    const OMDB_API   = `https://www.omdbapi.com/?apikey=d99a3838`;
    const TVMAZE_API = 'https://api.tvmaze.com';
    
    let supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    const localUserId = 'tvr_master_user_2026';

    let library = JSON.parse(localStorage.getItem('personal_tracker_db')) || [];
    let currentMediaType = 'series', searchResults = [];
    let showsCache = [];
    let activeModalMediaIndex = null, modalMode = 'preview', previewEpisodes = [];
    let calFilter = 'all';
    
    let currentDiscoverMode = 'mix';
    let discoverMediaType = 'series'; 
    
    const PAGE_SIZE = 30;
    const MAX_RESULTS = 300;
    let searchPage = 1, discoverPage = 1;
    let discoverResults = [];
    let todayString = new Date().toISOString().split('T')[0];

    let modalSuggestionsPool = [];
    let modalSuggestionsPage = 1;

    const seasonColors = ['bg-teal-500', 'bg-cyan-500', 'bg-emerald-500', 'bg-teal-400', 'bg-cyan-400', 'bg-emerald-400', 'bg-teal-600', 'bg-cyan-600'];

    // Observers pour le scroll infini
    const searchObserver = new IntersectionObserver(entries => {
        if (entries[0].isIntersecting && searchPage * PAGE_SIZE < searchResults.length) { 
            searchPage++; renderSearchGrid(false); 
        }
    });
    
    const discoverObserver = new IntersectionObserver(entries => {
        if (entries[0].isIntersecting && discoverPage * PAGE_SIZE < discoverResults.length) { 
            discoverPage++; renderDiscoverGrid(false); 
        }
    });
    
    const suggestionsObserver = new IntersectionObserver(entries => {
        if(entries[0].isIntersecting && modalSuggestionsPool.length > 0) { 
            modalSuggestionsPage++; appendSuggestions(); 
        }
    });
    
    window.addEventListener('DOMContentLoaded', () => {
        deduplicateLibrary();
        updateHeaderCount();
        preloadShowsCache();
        
        loadFromCloud(); // Initialisation de la synchronisation au démarrage

    // Fonction pour basculer l'affichage de la description
    function toggleEpisodeDescription(element) {
        const desc = element.querySelector('.episode-desc');
        if (desc) {
            desc.classList.toggle('hidden');
        }
    }
    
    // --- CALCULS GLOBAUX ---
    function getCalculatedRating(media) {
        if (media.type === 'series' && media.episodes && media.episodes.length > 0) {
            let total = 0, count = 0;
            media.episodes.forEach(e => {
                const r = (typeof e.rating === 'object' && e.rating !== null) ? e.rating.average : parseFloat(e.rating);
                if (r && !isNaN(r) && r > 0) { total += r; count++; }
            });
            if (count > 0) return parseFloat((total / count).toFixed(1));
        }
        return (media.rating && !isNaN(media.rating) && media.rating > 0) ? parseFloat(media.rating) : 0;
    }

    // --- UTILS BASE LOCALE & CLOUD ---
    function deduplicateLibrary() {
        const unique = [];
        const seen = new Set();
        library.sort((a,b) => (b.last_modified || 0) - (a.last_modified || 0));
        for(const item of library) {
            if(item && item.id && item.title && !seen.has(item.id)) {
                seen.add(item.id); unique.push(item);
            }
        }
        library = unique;
    }

    async function saveLocalDB(syncItem = null) {
        try {
            const cache = library.slice(0, 50); 
            localStorage.setItem('personal_tracker_db', JSON.stringify(cache));
        } catch (e) {
            console.warn("Cache local complet, seule la synchro Cloud est active.");
        }
        
        updateHeaderCount();
        
        if (syncItem && typeof supabaseClient !== 'undefined') {
            try {
                await supabaseClient.from('user_library').upsert({
                    user_id: localUserId,
                    media_id: syncItem.id,
                    media_data: syncItem,
                    last_modified: syncItem.last_modified || Date.now()
                }, { onConflict: 'user_id,media_id' });
            } catch (e) {
                console.error("Erreur critique de synchro Cloud :", e);
            }
        }
    }
    
    async function syncToCloud() {
        const statusEl = document.getElementById('cloudStatus');
        statusEl.textContent = '⏳ Sync...';
        
        try {
            const updates = library.map(item => ({
                user_id: localUserId,
                media_id: item.id,
                media_data: item,
                last_modified: item.last_modified || Date.now()
            }));

            const { error } = await supabaseClient
                .from('user_library')
                .upsert(updates, { onConflict: 'user_id,media_id' });
            
            if (error) throw error;
            statusEl.textContent = '🟢 Cloud';
            statusEl.className = 'cursor-pointer text-[10px] px-2 py-0.5 bg-gray-900 text-emerald-400 rounded-full font-bold transition-colors shadow border border-emerald-900/50';
        } catch(e) {
            console.error("Erreur de synchronisation", e);
            statusEl.textContent = '🔴 Erreur Sync';
        }
    }

    async function loadFromCloud() {
        const statusEl = document.getElementById('cloudStatus');
        statusEl.textContent = '⏳ Check...';
        
        try {
            const { data, error } = await supabaseClient
                .from('user_library')
                .select('media_data')
                .eq('user_id', localUserId);

            if (data && data.length > 0) {
                library = data.map(row => row.media_data);
                saveLocalDB(false); 
                statusEl.textContent = '🟢 Cloud';
                statusEl.className = 'cursor-pointer text-[10px] px-2 py-0.5 bg-gray-900 text-emerald-400 rounded-full font-bold transition-colors shadow border border-emerald-900/50';
                
                if(!document.getElementById('tab-library').classList.contains('hidden')) renderLibrary();
                if(!document.getElementById('tab-profile').classList.contains('hidden')) renderProfile();
            }
        } catch(e) {
            console.error("Erreur de chargement Cloud", e);
        }
    }

    async function forceSync() {
        await loadFromCloud();
    }

    // --- RECHERCHE ---

    document.getElementById('searchInput').addEventListener('input', e => {
        const q = e.target.value.trim();
        const clearBtn = document.getElementById('clearSearchBtn');
        
        if (q.length > 0) clearBtn.classList.remove('hidden');
        else clearBtn.classList.add('hidden');
        
        if (q.length > 2) triggerFuzzySearch(q);
        else if (q.length === 0) { searchResults=[]; resetAndDisplaySearch(); }
    });

    async function triggerFuzzySearch(query) {
        try {
            const [tvmazeRes, omdbRes] = await Promise.all([
                fetch(`${TVMAZE_API}/search/shows?q=${encodeURIComponent(query)}`).then(r => r.json()).catch(()=>[]),
                fetch(`${OMDB_API}&s=${encodeURIComponent(query)}&type=movie`).then(r => r.json()).catch(()=>[])
            ]);
            
            let results = [];
            if (Array.isArray(tvmazeRes)) results = results.concat(tvmazeRes.map(i => normalizeShow(i.show)));
            
            if (omdbRes.Search) {
                const movies = omdbRes.Search.map(m => ({
                    id: `movie-${m.imdbID}`, apiId: m.imdbID, title: m.Title, type: 'movie', 
                    image: m.Poster !== 'N/A' ? m.Poster : '', rating: 0, genres: [], 
                    premiered: m.Year, runtime: 120, summary: ''
                }));
                results = results.concat(movies);
            }
            
            searchResults = results.filter((v,i,a)=>a.findIndex(t=>(t.id===v.id))===i);
            resetAndDisplaySearch();
        } catch(e) {}
    }

    function resetAndDisplaySearch() { searchPage = 1; renderSearchGrid(true); }

    function renderSearchGrid(clear = false) {
        const container = document.getElementById('searchResults');
        if (clear) container.innerHTML = '';
        
        let filtered = searchResults.filter(r => r.type === currentMediaType);
        const start = (searchPage - 1) * PAGE_SIZE;
        const slice = filtered.slice(start, start + PAGE_SIZE);
        slice.forEach(m => container.appendChild(createMediaCard(m, false)));
    }

    // --- DECOUVERTE ---
    async function ensureShowsPool() {
        if (showsCache.length > 0) return;
        const res = await fetch(`${TVMAZE_API}/shows?page=0`);
        showsCache = await res.json();
    }
    async function preloadShowsCache() { await ensureShowsPool(); }

    function setDiscoverType(type) {
        discoverMediaType = type;
        document.getElementById('btn-disc-type-series').className = type === 'series' ? 'px-3 py-1 text-[10px] font-bold rounded shadow bg-teal-600 text-white transition' : 'px-3 py-1 text-[10px] font-bold rounded text-gray-400 hover:text-white transition';
        document.getElementById('btn-disc-type-movie').className = type === 'movie' ? 'px-3 py-1 text-[10px] font-bold rounded shadow bg-teal-600 text-white transition' : 'px-3 py-1 text-[10px] font-bold rounded text-gray-400 hover:text-white transition';
